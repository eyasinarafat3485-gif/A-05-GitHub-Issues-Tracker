<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <link rel="stylesheet" href="tailwind.config.css">

    <!-- tailwind and daisy add -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <!-- navbar section -->
        <nav class="bg-white border-b border-gray-200 pt-4 pb-4 pr-12 pl-12">
            <div class="md:flex items-center justify-between max-w-7xl mx-auto">

                <div class="flex items-center space-y-2 space-x-2">
                    <img src="assets/github-logo.png" alt="" class="w-[41px] ">
                    <span class="font-semibold text-xl ">GitHub Issues Tracker</span>
                </div>

                <div class=" items-center space-x-4">
                    <div id="nav-content" class=" md:flex items-center space-y-3">
                        <div class="join">
                            <div>
                                <label class="input validator join-item">
                                
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                                    <input id="input-search" type="search" placeholder="Search issues. . ." />
                                </label>
                                
                            </div>
                            <button id="btn-search" class="btn btn-primary join-item">Search</button>
                        </div>

                    </div>
                </div>
            </div>

        </nav>
    </header>
  
    <!-- count section -->
    <main class=" bg-gray-200 pt-20 ">
        <section class="space-y-6 w-[90%] mx-auto">
            <div class="bg-white p-6 space-x-2 md:space-x-4 rounded-md">

                <button onclick="toggleStyle('allBtn') ; filterIssue('all')" id="allBtn"
                    class="btn bg-blue-500 text-white py-2 px-5 sm:w-[50px] md:w-[100px] ">All</button>

                <button onclick="toggleStyle('openBtn') ; filterIssue('open')" id="openBtn"
                    class="btn bg-white py-2 px-5 hover:bg-blue-200 sm:w-[50px] md:w-[100px]">Open</button>

                <button onclick="toggleStyle('closedBtn') ; filterIssue('closed')" id="closedBtn"
                    class="btn bg-white py-2 px-5 hover:bg-blue-200 sm:w-[50px] md:w-[100px]">Closed</button>
            </div>

        </section>

         
        <!-- 50 issue section -->
        <section class="w-[90%] mx-auto mt-3 bg-white rounded-md shadow-md shrink-0.5 ">
            <div class=" md:flex items-center justify-between p-6 bg-white border border-gray-100 rounded-md shadow-sm">

                <div class="flex items-center gap-4 ">
                    <div class="flex items-center justify-center w-12 h-12 bg-purple-100 rounded-full">
                        <img src="assets/Aperture.png" alt="">
                    </div>

                    <div class="sm:grid grid-cols-4">
                        <div>

                            <p id="total" class="font-bold text-2xl"> <span id="issueCount">0</span> Issues</p>                          
                            <p class="text-sm text-slate-500">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="md:flex items-center gap-6 ">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                            <span class="text-sm font-medium text-slate-700">Open</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-purple-500 rounded-full "></span>
                            <span class="text-sm font-medium text-slate-700">Closed</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <section id="spinner" class="flex justify-center items-center py-[3px] hidden">
                <span class="loading loading-spinner loading-xl"></span>
            </section>
            <!-- all card section -->
            <div id="allCardSection" class="allCards mt-1 p-2 sm:col md:grid grid-cols-4 bg-white space-y-2 hidden">

            <!-- card 1 -->

            </div>
        </section>
        
        <!-- modal -->
        <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="details-container">


                </div>
                <div class="modal-action">
                    <form method="dialog">
                       
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>

    <script src="java-script/java2.js"></script>
</body>

</html>
