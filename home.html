<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <link rel="stylesheet" href="tailwind.config.css">

    <!-- tailwind and daisy add -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <!-- navbar section -->
        <nav class="bg-white border-b border-gray-200 p-4">
            <div class="flex items-center justify-between max-w-7xl mx-auto">

                <div class="flex items-center space-x-2">
                     <img src="assets/github-logo.png" alt="" class="w-[41px] ">
                    <span class="font-semibold text-xl ">GitHub Issues Tracker</span>
                </div>

                <div class="flex items-center space-x-4">
                    <div id="nav-content" class="hidden md:flex items-center space-x-3">
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </span>
                            <input type="search" placeholder="Search issues..."class="border rounded-md py-1 pl-8 pr-2 w-50 focus:w-64 transition-all duration-200 outline-none ">
                        </div>

                        <button class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-1 px-4 rounded-md flex items-center"><span class="mr-1 text-lg">+</span> New Issue </button>
                    </div>

                    <button id="menu-btn" class="md:hidden text-gray-600 focus:outline-none">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="mobile-menu" class="hidden md:hidden mt-4 space-y-3">
                <input type="text" placeholder="Search" class="w-full border rounded-md p-2 outline-none">
                <button class="w-full bg-blue-600 text-white py-2 rounded-md">+ New Issue</button>
            </div>
        </nav>


    </header>

    <!-- count section -->
    <main class=" bg-gray-200 pt-20 ">
        <section class="space-y-6 w-[85%] mx-auto">

            <!-- <button class="bg-blue-500 text-white py-2 px-5 rounded-md"
                    id="all-btn">Primary</button> -->

            <div class="bg-white p-6 space-x-2 md:space-x-4 rounded-md">

                <button class="btn bg-blue-500 text-white py-2 px-5 sm:w-[50px] md:w-[100px] ">All</button>
                <button class="btn bg-white py-2 px-5 hover:bg-blue-200 sm:w-[50px] md:w-[100px]">Open</button>
                <button class="btn bg-white py-2 px-5 hover:bg-blue-200 sm:w-[50px] md:w-[100px]">Closed</button>
            </div>
            <!-- class="bg-blue-500 text-white py-2 px-5 rounded-md"
                    id="all-btn" -->
            <!-- 1 onclick="toggleStyle('all-btn')" //onclick="toggleStyle('interview-btn')"//onclick="toggleStyle('rejected-btn')" -->


            <!-- <section id="fill-section" class="hidden space-y-6  p-8 ">

            </section> -->
        </section>

        <!-- 50 issue section -->
        <section class="w-[85%] mx-auto mt-3 bg-white rounded-md shadow-md shrink-0.5 ">
            <div class=" md:flex items-center justify-between p-6 bg-white border border-gray-100 rounded-md shadow-sm">

                <div class="flex items-center gap-4 ">
                    <div class="flex items-center justify-center w-12 h-12 bg-purple-100 rounded-full">
                        <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>

                    <div class="sm:grid grid-cols-4">
                        <div>
                            <h3 class="text-xl font-bold text-slate-800">50 Issues</h3>
                            <p class="text-sm text-slate-500">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="md:flex items-center gap-6 ">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                            <span class="text-sm font-medium text-slate-700">Open</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-purple-500 rounded-full "></span>
                            <span class="text-sm font-medium text-slate-700">Closed</span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- all card section -->
            <div id="cardContainer" class=" mt-1 p-3 sm:col md:grid grid-cols-4 gap-2 bg-white space-y-3 ">

                <!-- 1 -->

            </div>
        </section>
    </main>


    <script src="java-script/java2.js"></script>
</body>

</html>
